name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    
    strategy:
      matrix:
        os: [macos-latest]
        include:
          - os: macos-latest
            arch: x64
            target: mac-x64
            artifact-pattern: "dist/*.dmg"
          - os: macos-latest
            arch: arm64
            target: mac-arm64
            artifact-pattern: "dist/*.dmg"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        shell: bash
        run: pnpm install --no-frozen-lockfile

      - name: Build application
        shell: bash
        run: |
          echo "Building for target: ${{ matrix.target }}"
          echo "Architecture: ${{ matrix.arch }}"
          export ELECTRON_BUILDER_ARCH=${{ matrix.arch }}
          export ELECTRON_CACHE=${{ github.workspace }}/.cache/electron
          export ELECTRON_BUILDER_CACHE=${{ github.workspace }}/.cache/electron-builder
          mkdir -p ${{ github.workspace }}/.cache/electron
          mkdir -p ${{ github.workspace }}/.cache/electron-builder
          pnpm run dist:${{ matrix.target }}
          echo "Build completed for ${{ matrix.target }}"
        env:
          ELECTRON_BUILDER_ARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ github.ref_name }}
          path: ${{ matrix.artifact-pattern }}
          retention-days: 30

  create-release:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 