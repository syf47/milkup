name: Release

on:
  push:
    tags:
      - 'v*' # 当推送以v开头的标签时触发

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            arch: x64
            target: mac-x64
            artifact-pattern: "dist/*.dmg"
          - os: macos-latest
            arch: arm64
            target: mac-arm64
            artifact-pattern: "dist/*.dmg"
          - os: ubuntu-latest
            arch: x64
            target: linux-x64
            artifact-pattern: "dist/*.AppImage"
          - os: ubuntu-latest
            arch: arm64
            target: linux-arm64
            artifact-pattern: "dist/*.AppImage"
          - os: windows-latest
            arch: x64
            target: win-x64
            artifact-pattern: "dist/*.exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run dist:${{ matrix.target }}
        env:
          ELECTRON_BUILDER_ARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          ls -la dist/
          echo "Current directory:"
          pwd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ github.ref_name }}
          path: ${{ matrix.artifact-pattern }}
          retention-days: 30

  create-release:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.dmg" -o -name "*.AppImage" -o -name "*.exe" -o -name "*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 